<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Submit a product review. Rate your product, share your installation date, useful features, and written feedback.">
  <meta name="author" content="John Oluseye Akala">
  <title>Product Review</title>
  <link rel="stylesheet" href="styles/form.css">
  <script src="scripts/form.js" defer></script>
</head>
<body>
  <header class="site-header">
    <h1>Product Review</h1>
  </header>

  <main class="main">
    <form class="form-container" method="get" action="review.html">

      <!-- Product Name -->
      <div class="form-group">
        <label for="product-name">Product Name <abbr title="required">*</abbr></label>
        <select id="product-name" name="productName" required>
          <option value="" disabled selected>Select a Product ...</option>
        </select>
      </div>

      <!-- Overall Rating -->
      <div class="form-group">
        <fieldset class="rating-fieldset">
          <legend>Overall Rating <abbr title="required">*</abbr></legend>
          <div class="stars-rating" role="group" aria-label="Overall Rating">
            <input type="radio" id="star5" name="rating" value="5" required>
            <label for="star5" title="5 stars">&#9733;</label>
            <input type="radio" id="star4" name="rating" value="4" required>
            <label for="star4" title="4 stars">&#9733;</label>
            <input type="radio" id="star3" name="rating" value="3" required>
            <label for="star3" title="3 stars">&#9733;</label>
            <input type="radio" id="star2" name="rating" value="2" required>
            <label for="star2" title="2 stars">&#9733;</label>
            <input type="radio" id="star1" name="rating" value="1" required>
            <label for="star1" title="1 star">&#9733;</label>
          </div>
        </fieldset>
      </div>

      <!-- Date of Installation -->
      <div class="form-group">
        <label for="install-date">Date of Installation <abbr title="required">*</abbr></label>
        <input type="date" id="install-date" name="installDate" required>
      </div>

      <!-- Useful Features -->
      <div class="form-group">
        <fieldset>
          <legend>Which features did you find useful? <span class="subtitle">(Check all that apply)</span></legend>
          <div class="checkbox-group">
            <div class="checkbox-option">
              <input type="checkbox" id="feature-durability" name="features" value="durability">
              <label for="feature-durability">Durability</label>
            </div>
            <div class="checkbox-option">
              <input type="checkbox" id="feature-ease" name="features" value="ease-of-use">
              <label for="feature-ease">Ease of Use</label>
            </div>
            <div class="checkbox-option">
              <input type="checkbox" id="feature-performance" name="features" value="performance">
              <label for="feature-performance">Performance</label>
            </div>
            <div class="checkbox-option">
              <input type="checkbox" id="feature-design" name="features" value="design">
              <label for="feature-design">Design</label>
            </div>
            <div class="checkbox-option">
              <input type="checkbox" id="feature-value" name="features" value="value">
              <label for="feature-value">Value for Money</label>
            </div>
          </div>
        </fieldset>
      </div>

      <!-- Written Review -->
      <div class="form-group">
        <label for="written-review">Written Review <span class="optional">(Optional)</span></label>
        <textarea id="written-review" name="writtenReview" placeholder="Share your experience with this product..."></textarea>
      </div>

      <!-- User Name -->
      <div class="form-group">
        <label for="user-name">Your Name <span class="optional">(Optional)</span></label>
        <input type="text" id="user-name" name="userName" placeholder="Enter your name">
      </div>

      <!-- Submit -->
      <div class="form-group">
        <input type="submit" class="submit-btn" value="Post Review">
      </div>

    </form>
  </main>

  <footer class="site-footer">
    <span class="footer-line">&copy;2024 &#127866; Rubia Magdelena Francesco &#127866;</span>
    <span class="footer-line">Madagascar</span>
    <span class="footer-line" id="last-modified">Last Modification: <span id="mod-date"></span></span>
  </footer>

</body>
</html>
